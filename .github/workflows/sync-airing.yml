name: Schedule Airing Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync-airing:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Airing Sync API
        run: |
          URL="https://everyday-leela-elijahdev-f7780186.koyeb.app/system/sync/airing"
          echo "Triggering airing sync via POST..."
          curl -f -X POST "$URL" \
          -H "Authorization: Bearer ${{ secrets.API_KEY }}"
